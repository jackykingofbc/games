<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper 司令部 - 终端控制</title>
    <style>
        :root { --bg: #0d0d0f; --card: #1c1c1e; --text: #ffffff; --accent-blue: #0a84ff; --win-green: #32d74b; --loss-red: #ff453a; --warn-yellow: #ffd700; --border: #333; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: #111; padding: 15px 20px; border-bottom: 2px solid var(--accent-blue); display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 18px; font-weight: 900; color: var(--accent-blue); letter-spacing: 1px; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; display: none; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .panel-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th { color: #888; padding: 10px; border-bottom: 1px solid #444; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; }
        .btn { border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; margin-right: 4px; }
        .btn-blue { background: var(--accent-blue); color: #fff; }
        .btn-green { background: transparent; border: 1px solid var(--win-green); color: var(--win-green); }
        .btn-warn { background: transparent; border: 1px solid var(--warn-yellow); color: var(--warn-yellow); }
        .btn-red { background: transparent; border: 1px solid var(--loss-red); color: var(--loss-red); }
        .input-box { padding: 10px; background: #2c2c2e; border: 1px solid #444; color: #fff; border-radius: 6px; margin-right: 10px; }
        #loginLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { width: 300px; text-align: center; background: #1c1c1e; padding: 30px; border-radius: 12px; border: 1px solid var(--accent-blue); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="loginLayer">
        <div class="login-box">
            <h2 style="color:var(--accent-blue); margin-top:0;">司令部接入</h2>
            <input type="text" id="adminU" class="login-input" placeholder="最高指挥官账号">
            <input type="password" id="adminP" class="login-input" placeholder="访问密钥">
            <button class="btn btn-blue" style="width:100%; padding:12px; font-size:16px; margin-top:10px;" onclick="adminLogin()">授权进入</button>
            <div id="msg" style="color:var(--loss-red); margin-top:10px; font-size: 12px;"></div>
        </div>
    </div>

    <div class="header">
        <div class="title">💠 SNIPER COMMAND CENTER</div>
        <div>
            <button class="btn btn-warn" onclick="changeAdminPwd()">修改管理密码</button>
            <button class="btn btn-red" onclick="location.reload()">断开连接</button>
        </div>
    </div>

    <div class="container" id="dashboard">
        <div class="panel">
            <div class="panel-title"><span>👥 人员配给与权限统筹</span></div>
            <div style="margin-bottom: 20px; background: #000; padding: 15px; border-radius: 8px; border: 1px dashed #444;">
                <input type="text" id="newUsername" class="input-box" placeholder="新徒弟账号">
                <input type="text" id="newPassword" class="input-box" placeholder="初始密码">
                <button class="btn btn-blue" style="padding: 10px 20px;" onclick="manageUser('ADD')">➕ 发行新卡 (默认30天)</button>
            </div>
            <table>
                <thead>
                    <tr><th>专属ID</th><th>账号信息</th><th>授权到期日 / 剩余时长</th><th>当前状态</th><th>战术操作区</th></tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>

        <div class="panel">
            <div class="panel-title">👁️‍🗨️ X光级实时实战流水 (全局最近 50 手)</div>
            <table>
                <thead>
                    <tr><th>时间</th><th>徒弟账号</th><th>期数</th><th>下注动作</th><th>该手盈亏</th><th>全局总盈亏</th></tr>
                </thead>
                <tbody id="logsTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 🚨 绝对核心：已经自动瞄准你的 Render 后厨
        const API_URL = "https://quant-o79q.onrender.com"; 
        let ADMIN_CRED = { u: '', p: '' };

        async function adminLogin() {
            ADMIN_CRED.u = document.getElementById('adminU').value;
            ADMIN_CRED.p = document.getElementById('adminP').value;
            document.getElementById('msg').innerText = "验证密钥中...";
            try {
                const res = await fetch(API_URL + '/api/admin/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: ADMIN_CRED.u, password: ADMIN_CRED.p }) });
                if (res.ok) {
                    document.getElementById('loginLayer').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    fetchDashboardData(); setInterval(fetchDashboardData, 10000); 
                } else { document.getElementById('msg').innerText = "无权限，非法访问！"; }
            } catch (err) { document.getElementById('msg').innerText = "网络阻断，无法连接服务器。"; }
        }

        function formatRemainingTime(validUntilDate) {
            let now = new Date();
            let diffMs = validUntilDate - now;
            if (diffMs <= 0) return "<span style='color:var(--loss-red);font-weight:bold;'>已过期</span>";
            let d = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            let h = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
            return `<span style='color:var(--win-green);font-weight:bold;'>剩余: ${d}天 ${h}小时</span>`;
        }

        async function fetchDashboardData() {
            const res = await fetch(API_URL + '/api/admin/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: ADMIN_CRED.u, password: ADMIN_CRED.p }) });
            const data = await res.json();
            
            let usersHtml = "";
            data.users.forEach(u => {
                let expiryDate = new Date(u.valid_until);
                let timeStr = u.role === 'admin' ? '<span style="color:var(--warn-yellow)">永恒豁免</span>' : formatRemainingTime(expiryDate);
                
                let statusText = "";
                if (u.role === 'admin') statusText = '<span style="color:var(--warn-yellow)">最高统帅</span>';
                else if (u.status === 'paused') statusText = '<span style="color:var(--warn-yellow);font-weight:bold;">已暂停 ⏸️</span>';
                else if (expiryDate < new Date()) statusText = '<span style="color:var(--loss-red);font-weight:bold;">已到期 🛑</span>';
                else statusText = '<span style="color:var(--win-green);font-weight:bold;">运行中 ▶️</span>';

                usersHtml += `<tr>
                    <td><span style="background:#333;padding:4px 8px;border-radius:4px;font-family:monospace;">UID-${u.id}</span></td>
                    <td>
                        <div style="font-weight:bold; color:#fff; font-size:14px;">${u.username}</div>
                        <div style="color:#666; font-size:11px;">Pwd: ${u.password}</div>
                    </td>
                    <td><div style="color:#aaa;font-size:11px;">${u.role==='admin' ? '-' : expiryDate.toLocaleDateString() + ' ' + expiryDate.toLocaleTimeString()}</div>${timeStr}</td>
                    <td>${statusText}</td>
                    <td>
                        ${u.role !== 'admin' ? `
                            <button class="btn btn-blue" onclick="manageUser('EDIT_USER', ${u.id}, '${u.username}')">改账号</button>
                            <button class="btn btn-green" onclick="manageUser('EDIT_TIME', ${u.id})">改时长</button>
                            <button class="btn btn-warn" onclick="manageUser('TOGGLE_PAUSE', ${u.id})">${u.status==='paused' ? '恢复运行' : '暂停挂起'}</button>
                            <button class="btn btn-red" style="margin-left:10px;" onclick="manageUser('DELETE', ${u.id}, '${u.username}')">彻底删除</button>
                        ` : '-'}
                    </td>
                </tr>`;
            });
            document.getElementById('usersTableBody').innerHTML = usersHtml;

            let logsHtml = "";
            data.logs.forEach(l => {
                let logTime = new Date(l.created_at).toLocaleTimeString();
                let plColor = l.profit_loss > 0 ? "var(--win-green)" : (l.profit_loss < 0 ? "var(--loss-red)" : "#888");
                let tplColor = l.total_pl > 0 ? "var(--win-green)" : (l.total_pl < 0 ? "var(--loss-red)" : "#fff");
                logsHtml += `<tr><td style="color:#888">${logTime}</td><td style="color:var(--accent-blue); font-weight:bold;">${l.username}</td><td>G${l.group_num}</td><td>${l.action}</td><td style="color:${plColor}; font-weight:bold;">${l.profit_loss > 0 ? '+'+l.profit_loss : l.profit_loss}</td><td style="color:${tplColor}; font-weight:bold;">${l.total_pl}</td></tr>`;
            });
            document.getElementById('logsTableBody').innerHTML = logsHtml;
        }

        async function changeAdminPwd() {
            let newPwd = prompt("请输入您新的最高指挥官密码：\n(修改后需重新登录)");
            if (!newPwd || newPwd.trim() === '') return;
            await sendManageRequest({ manageAction: 'CHANGE_ADMIN_PWD', newPassword: newPwd.trim() });
            alert("修改成功！系统即将断开连接，请用新密码重新登录。");
            location.reload();
        }

        async function manageUser(action, targetId = null, oldUsername = null) {
            let reqBody = { manageAction: action, targetId: targetId, oldUsername: oldUsername };
            
            if (action === 'ADD') {
                reqBody.newUsername = document.getElementById('newUsername').value;
                reqBody.newPassword = document.getElementById('newPassword').value;
                if (!reqBody.newUsername || !reqBody.newPassword) return alert("账号和密码不能为空！");
            } 
            else if (action === 'EDIT_USER') {
                let input = prompt(`修改 UID-${targetId} 的账号和密码。\n请用空格隔开（例如：newTest 888999）：`);
                if (!input) return;
                let parts = input.trim().split(/\s+/);
                if (parts.length < 2) return alert("格式错误！必须同时输入账号和密码，用空格隔开。");
                reqBody.newUsername = parts[0]; reqBody.newPassword = parts[1];
            }
            else if (action === 'EDIT_TIME') {
                let input = prompt(`为 UID-${targetId} 修改时长。\n输入要增加的天数（填正数增加，填负数扣减，填 0 无效）：`, "30");
                if (!input || isNaN(parseInt(input))) return;
                reqBody.addDays = parseInt(input);
            }
            else if (action === 'TOGGLE_PAUSE') {
                // 无需弹窗，直接发送指令
            }
            else if (action === 'DELETE') {
                if(!confirm(`⚠️ 危险操作！\n确定要彻底删除徒弟 [${oldUsername}] 的账号和历史流水吗？\n如果只是不想让他登，建议使用【暂停】功能！`)) return;
            }

            await sendManageRequest(reqBody);
        }

        async function sendManageRequest(reqBody) {
            reqBody.username = ADMIN_CRED.u;
            reqBody.password = ADMIN_CRED.p;
            try {
                const res = await fetch(API_URL + '/api/admin/manage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reqBody) });
                if(res.ok) {
                    if (reqBody.manageAction === 'ADD') { document.getElementById('newUsername').value = ''; document.getElementById('newPassword').value = ''; }
                    fetchDashboardData(); 
                } else { alert("操作拒绝！可能是账号名与其他徒弟重复了。"); }
            } catch(e) { alert("网络异常"); }
        }
    </script>
</body>
</html>
