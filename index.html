<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --accent: #ffd700; --win: #32d74b; --loss: #ff453a; --border: #333; --banker-bg: #ff453a; --player-bg: #0a84ff; --wait-bg: #555555; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; -webkit-user-select: none; user-select: none; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: center; color: var(--accent); font-weight: bold; font-size: 18px; backdrop-filter: blur(5px); }

        .modal-box { width: 85%; max-width: 340px; text-align: center; background: #1c1c1e; padding: 25px 20px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-input { width: 100%; padding: 12px; margin: 8px 0 15px 0; background: #2c2c2e; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }

        .btn-cancel { background: #444; color: #fff; }

        .btn-group-top { display: flex; gap: 8px; z-index: 2; }
        .btn-small { background: #333; color: #ccc; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-reset { color: var(--loss); }
        .btn-logout { background: transparent; border: 1px solid #666; color: #aaa; }
        .btn-setting { background: transparent; border: 1px solid #555; color: #fff; display: none; }

        .comm-row { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; }

        .cum-item { background: #2c2c2e; border-radius: 8px; padding: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cum-label { font-size: 11px; color: #aaa; margin-bottom: 2px; font-weight: bold; text-align: center; }
        .cum-val-box { display: flex; align-items: baseline; gap: 3px; }
        .cum-val { font-size: 16px; font-weight: bold; }
        .cum-rate { font-size: 10px; color: #888; }
        .reg-progress-area { margin-bottom: 8px; padding: 0 4px; }
        .reg-label-row { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 4px; font-weight: bold; }
        .reg-bar-bg { height: 6px; background: #333; border-radius: 3px; overflow: hidden; border: 1px solid #444; }
        .reg-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent) 0%, var(--win) 100%); box-shadow: 0 0 8px rgba(50, 215, 75, 0.2); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .labouchere-display { background: #111; border: 1px dashed #444; border-radius: 8px; padding: 8px; margin-bottom: 8px; text-align: center; font-size: 16px; color: var(--accent); font-family: monospace; font-weight: bold; display: none; word-wrap: break-word; letter-spacing: 1px; }
        .labouchere-label { font-size: 10px; color: #888; display: block; margin-bottom: 4px; letter-spacing: normal; font-family: -apple-system, sans-serif; font-weight: normal; }
        .dual-core-container { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .core-box { background: #111; border: 1px dashed #555; border-radius: 8px; padding: 8px; text-align: center; position: relative; }
        .core-title { font-size: 11px; color: #aaa; margin-bottom: 4px; font-weight: bold;}
        .core-seq { font-size: 14px; font-family: monospace; color: var(--accent); font-weight: bold; word-wrap: break-word;}
        .core-pl { font-size: 12px; font-weight: bold; margin-top: 5px; }
        .sys-log-box { background: rgba(0,0,0,0.3); border-left: 3px solid #0a84ff; padding: 6px 10px; font-size: 11px; color: #ccc; margin-bottom: 8px; height: 45px; overflow-y: auto; border-radius: 0 8px 8px 0; display: flex; flex-direction: column; justify-content: flex-end; }
        .log-entry { margin-top: 2px; }
        .instr-card { background: linear-gradient(135deg, #3a3a3c, #2c2c2e); border: 1px solid #444; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .phase-text { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .main-instr { font-size: 28px; font-weight: 900; line-height: 1.2; display: flex; justify-content: center; align-items: baseline; gap: 10px; }
        .wl-container { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .wl-stats { font-size: 11px; color: #888; margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; display: flex; justify-content: space-between; }
        .wl-list { display: flex; flex-wrap: wrap; gap: 4px; font-size: 14px; min-height: 20px; max-height: 60px; overflow-y: auto; align-content: flex-start; }
        .wl-item-win { color: var(--win); }
        .wl-item-loss { color: var(--loss); }
        .side-B { color: var(--banker-bg); }
        .side-P { color: var(--player-bg); }
        .side-Wait { color: #888; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-big { padding: 18px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.4); transition: all 0.05s ease; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; position: relative; top: 0; }
        .bg-b { background: var(--banker-bg); }
        .bg-p { background: var(--player-bg); }
        .btn-big:active { transform: scale(0.95); box-shadow: 0 2px 0 rgba(0,0,0,0.4); filter: brightness(0.7); top: 4px; }
        .btn-disabled { filter: grayscale(100%) opacity(0.5) !important; pointer-events: none; box-shadow: none !important; top: 4px !important; transform: scale(0.98); }
